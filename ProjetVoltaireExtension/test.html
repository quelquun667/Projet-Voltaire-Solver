<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet Voltaire Test Page</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .exercise-container {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
            margin: 0 auto;
        }

        .sentence {
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .word {
            cursor: pointer;
            padding: 2px 5px;
        }

        .word:hover {
            background-color: #e0e0e0;
        }

        .next-btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="exercise-container">
        <h1>Simulation Projet Voltaire</h1>
        <p>This page simulates the structure for testing the extension.</p>

        <div class="sentence">
            <span class="word">Je</span>
            <span class="word">mange</span>
            <span class="word">des</span>
            <span class="word">pommes</span>.
        </div>

        <button class="next-btn">Suivant</button>
    </div>
</body>

</html>
